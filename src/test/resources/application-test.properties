spring.datasource.url=jdbc:h2:mem:store_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.main.allow-bean-definition-overriding=true
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.producer.properties.max.block.ms=200
spring.kafka.producer.properties.delivery.timeout.ms=500
spring.kafka.producer.properties.request.timeout.ms=300
spring.kafka.producer.properties.retries=0
search.infrastructure.kafka.producer.ack-timeout-ms=200
logging.level.org.springframework.security=warn
