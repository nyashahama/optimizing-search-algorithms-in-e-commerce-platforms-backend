spring.application.name=store
# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/store_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security Configuration
spring.security.user.name=${SPRING_SECURITY_USER_NAME:}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:}
spring.security.user.roles=${SPRING_SECURITY_USER_ROLES:}

security.bootstrap.admin.enabled=${SECURITY_BOOTSTRAP_ADMIN_ENABLED:true}
security.bootstrap.admin.email=${SECURITY_BOOTSTRAP_ADMIN_EMAIL:}
security.bootstrap.admin.password=${SECURITY_BOOTSTRAP_ADMIN_PASSWORD:}
security.bootstrap.admin.name=${SECURITY_BOOTSTRAP_ADMIN_NAME:Admin User}

security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
security.rate-limit.requests-per-minute=${SECURITY_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
security.rate-limit.window-ms=${SECURITY_RATE_LIMIT_WINDOW_MS:60000}

# Server Configuration (optional)
server.port=8080
server.tomcat.max-swallow-size=2MB

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.defaults.enabled=true

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=search-indexer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Search Indexing
search.infrastructure.kafka.product-event-topic=product-index-events
search.infrastructure.kafka.consumer-group-id=indexer-group
search.infrastructure.kafka.retry-delay-ms=30000
search.infrastructure.kafka.max-retries=4
search.infrastructure.kafka.producer.retry-attempts=3
search.infrastructure.kafka.producer.retry-delay-ms=500
search.infrastructure.kafka.backpressure.pending-threshold=50
search.infrastructure.kafka.backpressure.age-ms-threshold=120000

benchmark.reports.base-directory=reports

search.infrastructure.opensearch.base-url=${OPENSEARCH_URL:http://localhost:9200}
search.infrastructure.opensearch.username=${OPENSEARCH_USERNAME}
search.infrastructure.opensearch.password=${OPENSEARCH_PASSWORD}
