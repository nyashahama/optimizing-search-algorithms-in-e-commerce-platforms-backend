spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/store_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

search.infrastructure.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
search.infrastructure.opensearch.base-url=${OPENSEARCH_URL:http://opensearch:9200}
search.infrastructure.opensearch.username=${OPENSEARCH_USERNAME}
search.infrastructure.opensearch.password=${OPENSEARCH_PASSWORD}
