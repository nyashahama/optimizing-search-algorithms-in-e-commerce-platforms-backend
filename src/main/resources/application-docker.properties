spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/store_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=search-indexer

search.infrastructure.opensearch.base-url=${OPENSEARCH_URL:http://opensearch:9200}
search.infrastructure.opensearch.username=${OPENSEARCH_USERNAME}
search.infrastructure.opensearch.password=${OPENSEARCH_PASSWORD}
search.infrastructure.kafka.product-event-topic=product-index-events
search.infrastructure.kafka.consumer-group-id=indexer-group
search.infrastructure.kafka.retry-delay-ms=30000
search.infrastructure.kafka.max-retries=4
search.infrastructure.kafka.producer.retry-attempts=3
search.infrastructure.kafka.producer.retry-delay-ms=500
search.infrastructure.kafka.backpressure.pending-threshold=50
search.infrastructure.kafka.backpressure.age-ms-threshold=120000

benchmark.reports.base-directory=reports

security.bootstrap.admin.enabled=${SECURITY_BOOTSTRAP_ADMIN_ENABLED:true}
security.bootstrap.admin.email=${SECURITY_BOOTSTRAP_ADMIN_EMAIL:}
security.bootstrap.admin.password=${SECURITY_BOOTSTRAP_ADMIN_PASSWORD:}
security.bootstrap.admin.name=${SECURITY_BOOTSTRAP_ADMIN_NAME:Admin User}

security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
security.rate-limit.requests-per-minute=${SECURITY_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
security.rate-limit.window-ms=${SECURITY_RATE_LIMIT_WINDOW_MS:60000}
